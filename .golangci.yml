version: "2"

linters:
  enable:
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
  exclusions:
    paths:
      - .cache
    rules:
      - path: _test\.go
        linters:
          - gocritic

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
