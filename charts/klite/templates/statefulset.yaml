{{- if .Values.replication.enabled }}
{{- if not .Values.s3.bucket }}
  {{- fail "replication.enabled requires s3.bucket to be set" }}
{{- end }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "klite.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "klite.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: 2
  podManagementPolicy: Parallel
  serviceName: {{ include "klite.fullname" . }}-headless
  selector:
    matchLabels:
      {{- include "klite.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "klite.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      serviceAccountName: {{ include "klite.serviceAccountName" . }}
      automountServiceAccountToken: true
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: klite
          image: {{ include "klite.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - --listen={{ .Values.broker.listen }}
            - --data-dir={{ .Values.broker.dataDir }}
            - --default-partitions={{ .Values.broker.defaultPartitions }}
            - --auto-create-topics={{ .Values.broker.autoCreateTopics }}
            - --log-level={{ .Values.broker.logLevel }}
            - --advertised-addr={{ include "klite.advertisedAddr" . }}
            - --cluster-id={{ include "klite.clusterID" . }}
            {{- if .Values.health.enabled }}
            - --health-addr=:{{ .Values.health.port }}
            {{- end }}
            - --s3-bucket={{ .Values.s3.bucket }}
            {{- if .Values.s3.region }}
            - --s3-region={{ .Values.s3.region }}
            {{- end }}
            {{- if .Values.s3.endpoint }}
            - --s3-endpoint={{ .Values.s3.endpoint }}
            {{- end }}
            {{- if .Values.s3.prefix }}
            - --s3-prefix={{ .Values.s3.prefix }}
            {{- end }}
            - --replication-addr=:{{ .Values.replication.port }}
            - --replication-advertised-addr=$(POD_NAME).{{ include "klite.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.replication.port }}
            - --replication-tls-san=*.{{ include "klite.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local
            - --replication-id=$(POD_NAME)
            - --replication-ack-timeout={{ .Values.replication.ackTimeout }}
            - --lease-duration={{ .Values.replication.leaseDuration }}
            - --lease-renew-interval={{ .Values.replication.leaseRenewInterval }}
            - --lease-retry-interval={{ .Values.replication.leaseRetryInterval }}
            {{- with .Values.broker.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: kafka
              containerPort: 9092
              protocol: TCP
            {{- if .Values.health.enabled }}
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
            {{- end }}
            - name: replication
              containerPort: {{ .Values.replication.port }}
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KLITE_LABEL_SELECTOR
              value: {{ include "klite.selectorLabels" . | trim | replace "\n" "," | replace ": " "=" | quote }}
            {{- if .Values.s3.existingSecret }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecret }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecret }}
                  key: AWS_SECRET_ACCESS_KEY
            {{- end }}
            {{- with .Values.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.health.enabled }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.broker.dataDir }}
            {{- if .Values.containerSecurityContext.readOnlyRootFilesystem }}
            - name: tmp
              mountPath: /tmp
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- if .Values.containerSecurityContext.readOnlyRootFilesystem }}
        - name: tmp
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "klite.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "klite.selectorLabels" . | nindent 10 }}
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}
{{- end }}
