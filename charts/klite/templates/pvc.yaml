{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) (not .Values.replication.enabled) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "klite.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "klite.labels" . | nindent 4 }}
  {{- with mustMerge (dict) .Values.persistence.annotations .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.accessModes | nindent 4 }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
{{- end }}
